<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <strong>VintageApp · Listing-Helfer</strong>
      <button id="toggleSettings" class="link" type="button">⚙︎</button>
    </header>

    <section id="settings" hidden>
      <label for="backendUrl">Backend-URL</label>
      <input id="backendUrl" type="text" placeholder="http://localhost:3000" />
      <p class="hint">URL deiner laufenden VintageApp. Standard: http://localhost:3000</p>
      <label for="apiKey" style="margin-top: 8px">API-Key (optional)</label>
      <input id="apiKey" type="password" placeholder="nur bei geschütztem Backend" />
      <p class="hint">Nur nötig, wenn das Backend mit APP_API_KEY geschützt ist.</p>
    </section>

    <section>
      <input id="file" type="file" accept="image/png,image/jpeg,image/webp,image/gif" />
      <button id="generate" type="button" disabled>Listing generieren</button>
      <p id="status" class="hint"></p>
    </section>

    <section id="result" hidden></section>

    <script src="popup.js"></script>
  </body>
</html>
